<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>앨범 뷰어</title>
<script src="apikey.js?v=20260421"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --cream:#F5F0E8; --brown:#5C4A32; --light:#A08060; --gold:#C9A84C; --shadow:rgba(80,50,20,0.18); }
  html, body { height:100%; background:var(--cream); font-family:'Noto Sans KR',sans-serif; color:var(--brown); overflow:hidden; touch-action:none; }
  #album-screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:0 0.5rem; }
  .book { border-radius:3px; overflow:hidden; box-shadow:-6px 6px 20px var(--shadow),6px 6px 20px var(--shadow),0 2px 6px rgba(0,0,0,0.12); transition:opacity 0.22s ease,transform 0.3s ease; position:relative; flex-shrink:0; }
  .book.turning { opacity:0; transform:scaleX(0.97); }
  .book.zoomed { transform:scale(1.8); z-index:50; box-shadow:0 0 0 100vmax rgba(0,0,0,0.5); }
  .book.single { width:min(92vw,calc(78vh * 14/11)); height:min(calc(92vw * 11/14),78vh); }
  .book.spread { width:min(96vw,calc(78vh * 28/11)); height:min(calc(96vw * 11/28),78vh); }
  @media (orientation:landscape) {
    #album-screen { gap:0.8rem; }
    .book.single { width:min(44vw,calc(82vh * 14/11)); height:min(calc(44vw * 11/14),82vh); }
    .book.spread { width:min(96vw,calc(82vh * 28/11)); height:min(calc(96vw * 11/28),82vh); }
    .kb-hint { display:none; }
  }
  .book img { width:100%; height:100%; object-fit:cover; display:block; }
  .book .spine { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); width:5px; background:linear-gradient(to right,#8A6A40 0%,#C9A070 30%,#B08050 50%,#8A6A40 100%); pointer-events:none; }
  .book .loading-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#FAF7F2; }
  .book .loading-spinner::after { content:''; width:28px; height:28px; border:2px solid #D4C4A8; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .controls { display:flex; align-items:center; gap:1.5rem; }
  .ctrl-btn { width:44px; height:44px; border-radius:50%; border:1px solid #D4C4A8; background:rgba(255,255,255,0.7); color:var(--brown); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s,border-color 0.15s,transform 0.1s; -webkit-tap-highlight-color:transparent; }
  .ctrl-btn:hover:not(:disabled) { background:rgba(255,255,255,0.95); border-color:var(--gold); }
  .ctrl-btn:active:not(:disabled) { transform:scale(0.95); }
  .ctrl-btn:disabled { opacity:0.25; cursor:default; }
  .page-counter { font-size:13px; color:var(--light); letter-spacing:0.1em; min-width:70px; text-align:center; }
  .kb-hint { font-size:11px; color:#C0B09A; letter-spacing:0.06em; }
  .err { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--light); text-align:center; line-height:1.8; white-space:pre-line; padding:2rem; }
</style>
</head>
<body>
<div id="album-screen">
  <div class="book single" id="book">
    <div class="loading-spinner"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-prev" onclick="go(-1)" disabled>&#8249;</button>
    <div class="page-counter" id="counter"></div>
    <button class="ctrl-btn" id="btn-next" onclick="go(1)">&#8250;</button>
  </div>
  <div class="kb-hint">← → 키 또는 스와이프로 넘길 수 있어요</div>
</div>

<script>
const params  = new URLSearchParams(location.search);
const FOLDER  = params.get('folder') || '';
const API_KEY = window.GAPI_KEY || '';

let pages = [], cur = 0, zoomed = false;

// 이미지 캐시: url → HTMLImageElement (로드 완료된 것)
const cache = {};

// 지정 인덱스 이미지를 백그라운드에서 미리 로드
function preload(idx) {
  if (idx < 0 || idx >= pages.length) return;
  const url = pages[idx].url;
  if (cache[url]) return; // 이미 있으면 패스
  const img = new Image();
  img.onload = () => { cache[url] = img; };
  img.src = url;
}

async function loadAlbum() {
  if (!FOLDER) { showErr('폴더 정보가 없습니다.'); return; }
  if (!API_KEY) { showErr('API 키가 설정되지 않았습니다.'); return; }
  try {
    const url = `https://www.googleapis.com/drive/v3/files`
      + `?q=%27${FOLDER}%27+in+parents+and+mimeType+contains+%27image/%27`
      + `&fields=files(id,name)&orderBy=name&pageSize=200&key=${API_KEY}`;
    const data = await fetch(url).then(r => r.json());
    if (data.error) { showErr('드라이브 오류:\n' + data.error.message); return; }
    if (!data.files || !data.files.length) { showErr('사진을 찾을 수 없습니다.\n드라이브 폴더 공유 설정을 확인해 주세요.'); return; }

    pages = data.files.map(f => {
      const base = f.name.replace(/\.[^.]+$/, '').toLowerCase();
      let sortKey;
      if (base === 'cover')     sortKey = '000000';
      else if (base === 'back') sortKey = 'zzzzzz';
      else                      sortKey = base.replace(/\D/g,'').padStart(6,'0');
      const isSingle = base === 'cover' || base === 'back' || base.replace(/\D/g,'').length <= 2;
      return {
        sortKey,
        type: isSingle ? 'single' : 'spread',
        url: `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`
      };
    }).sort((a,b) => a.sortKey.localeCompare(b.sortKey));

    cur = 0;
    // 첫 페이지 + 다음 2장 미리 로드
    preload(0); preload(1); preload(2);
    render();
  } catch(e) { showErr('불러오기 실패:\n' + e.message); }
}

function showErr(msg) {
  document.getElementById('album-screen').innerHTML = `<div class="err">${msg}</div>`;
}

function render() {
  const p    = pages[cur];
  const book = document.getElementById('book');
  zoomed = false;
  book.classList.remove('zoomed', 'turning');
  book.className = 'book ' + p.type;

  document.getElementById('counter').textContent = `${cur+1} / ${pages.length}`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === pages.length - 1;

  const cached = cache[p.url];
  if (cached) {
    // 캐시 히트: 바로 표시
    showImg(book, cached.cloneNode(), p.type);
  } else {
    // 캐시 미스: 스피너 보여주고 로드
    book.innerHTML = '<div class="loading-spinner"></div>';
    if (p.type === 'spread') book.innerHTML += '<div class="spine"></div>';
    const img = new Image();
    img.onload = () => {
      cache[p.url] = img;
      showImg(book, img.cloneNode(), p.type);
    };
    img.onerror = () => { book.innerHTML = '<div class="err" style="position:absolute;inset:0;">이미지 오류</div>'; };
    img.src = p.url;
  }

  // 앞뒤 2장씩 미리 로드
  preload(cur + 1); preload(cur + 2);
  preload(cur - 1); preload(cur - 2);
}

function showImg(book, img, type) {
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  book.innerHTML = '';
  book.appendChild(img);
  if (type === 'spread') {
    const spine = document.createElement('div');
    spine.className = 'spine';
    book.appendChild(spine);
  }
}

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= pages.length) return;
  if (zoomed) { toggleZoom(); return; }
  const book = document.getElementById('book');
  book.classList.add('turning');
  setTimeout(() => { cur = next; render(); }, 220);
}

function toggleZoom() {
  const book = document.getElementById('book');
  zoomed = !zoomed;
  book.classList.toggle('zoomed', zoomed);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
});

let tx = 0, ty = 0, lastTap = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const now = Date.now();
  if (now - lastTap < 300 && Math.abs(dx) < 20 && Math.abs(dy) < 20) {
    toggleZoom(); lastTap = 0; return;
  }
  lastTap = now;
  if (!zoomed && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
}, {passive:true});

loadAlbum();
</script>
</body>
</html>
