<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>앨범 뷰어</title>
<script src="apikey.js?v=20260421"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --cream:#F5F0E8; --brown:#5C4A32; --light:#A08060; --gold:#C9A84C; --shadow:rgba(80,50,20,0.18); }
  html, body { height:100%; width:100%; background:var(--cream); font-family:'Noto Sans KR',sans-serif; color:var(--brown); overflow:hidden; touch-action:none; }

  #album-screen {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:1.2rem; padding:8px;
  }
  .book {
    border-radius:3px; overflow:hidden;
    box-shadow:-6px 6px 20px var(--shadow),6px 6px 20px var(--shadow),0 2px 6px rgba(0,0,0,0.12);
    transition:opacity 0.22s ease;
    position:relative; flex-shrink:0;
  }
  .book.turning { opacity:0; }
  .book.single { width:min(55vw,calc(70vh * 14/11)); height:min(calc(55vw * 11/14),70vh); }
  .book.spread { width:min(92vw,calc(70vh * 28/11)); height:min(calc(92vw * 11/28),70vh); }

  @media (max-width:900px) and (orientation:landscape) {
    #album-screen { gap:0.4rem; padding:2px; }
    .book.single { width:min(44vw,calc(88vh * 14/11)); height:min(calc(44vw * 11/14),88vh); }
    .book.spread { width:min(99vw,calc(88vh * 28/11)); height:min(calc(99vw * 11/28),88vh); }
    .ctrl-btn { width:32px; height:32px; font-size:16px; }
    .page-counter { font-size:11px; min-width:50px; }
    .kb-hint { display:none; }
  }

  .book img { width:100%; height:100%; object-fit:cover; display:block; }
  .book .spine {
    position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%);
    width:5px; background:linear-gradient(to right,#8A6A40 0%,#C9A070 30%,#B08050 50%,#8A6A40 100%);
    pointer-events:none;
  }
  .book .loading-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#FAF7F2; }
  .book .loading-spinner::after { content:''; width:28px; height:28px; border:2px solid #D4C4A8; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* 모바일 확대 오버레이 */
  #zoom-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.88);
    z-index:100; touch-action:none;
    overflow:hidden;
  }
  #zoom-overlay.active { display:block; }
  #zoom-img {
    position:absolute;
    touch-action:none;
    user-select:none;
    -webkit-user-drag:none;
    object-fit:contain;
  }
  /* PC에서는 확대 완전 비활성 */
  @media (hover:hover) and (pointer:fine) {
    #zoom-overlay { display:none !important; }
  }

  .controls { display:flex; align-items:center; gap:1.5rem; }
  .ctrl-btn {
    width:44px; height:44px; border-radius:50%;
    border:1px solid #D4C4A8; background:rgba(255,255,255,0.7);
    color:var(--brown); font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s,border-color 0.15s,transform 0.1s;
    -webkit-tap-highlight-color:transparent;
  }
  .ctrl-btn:hover:not(:disabled) { background:rgba(255,255,255,0.95); border-color:var(--gold); }
  .ctrl-btn:active:not(:disabled) { transform:scale(0.95); }
  .ctrl-btn:disabled { opacity:0.25; cursor:default; }
  .page-counter { font-size:13px; color:var(--light); letter-spacing:0.1em; min-width:70px; text-align:center; }
  .kb-hint { font-size:11px; color:#C0B09A; letter-spacing:0.06em; }
  .err { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--light); text-align:center; line-height:1.8; white-space:pre-line; padding:2rem; }
</style>
</head>
<body>

<div id="album-screen">
  <div class="book single" id="book">
    <div class="loading-spinner"></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-prev" onclick="go(-1)" disabled>&#8249;</button>
    <div class="page-counter" id="counter"></div>
    <button class="ctrl-btn" id="btn-next" onclick="go(1)">&#8250;</button>
  </div>
  <div class="kb-hint">← → 키 또는 스와이프로 넘길 수 있어요</div>
</div>

<div id="zoom-overlay">
  <img id="zoom-img" draggable="false" />
</div>

<script>
const params  = new URLSearchParams(location.search);
const FOLDER  = params.get('folder') || '';
const API_KEY = window.GAPI_KEY || '';
const isMobile = !window.matchMedia('(hover:hover) and (pointer:fine)').matches;

let pages = [], cur = 0;
const cache = {};
let zoomed = false;
let lastTapTime = 0;
let lastTapX = 0, lastTapY = 0;

/* ── 가로 모드 전체화면 (모바일만) ── */
function handleOrientation() {
  if (!isMobile) return;
  const isLandscape = window.innerWidth > window.innerHeight;
  const el = document.documentElement;
  if (isLandscape && !document.fullscreenElement) {
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (fn) fn.call(el).catch(()=>{});
  } else if (!isLandscape && document.fullscreenElement) {
    const fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if (fn) fn.call(document).catch(()=>{});
  }
}
window.addEventListener('orientationchange', () => setTimeout(handleOrientation, 400));
window.addEventListener('resize', () => setTimeout(handleOrientation, 400));

/* ── 프리로드 ── */
function preload(idx) {
  if (idx < 0 || idx >= pages.length || cache[pages[idx].url]) return;
  const img = new Image();
  img.onload = () => { cache[pages[idx].url] = img; };
  img.src = pages[idx].url;
}

async function loadAlbum() {
  if (!FOLDER) { showErr('폴더 정보가 없습니다.'); return; }
  if (!API_KEY) { showErr('API 키가 설정되지 않았습니다.'); return; }
  try {
    const url = `https://www.googleapis.com/drive/v3/files`
      + `?q=%27${FOLDER}%27+in+parents+and+mimeType+contains+%27image/%27`
      + `&fields=files(id,name)&orderBy=name&pageSize=200&key=${API_KEY}`;
    const data = await fetch(url).then(r => r.json());
    if (data.error) { showErr('드라이브 오류:\n' + data.error.message); return; }
    if (!data.files || !data.files.length) { showErr('사진을 찾을 수 없습니다.'); return; }
    pages = data.files.map(f => {
      const base = f.name.replace(/\.[^.]+$/, '').toLowerCase();
      const sortKey = base === 'cover' ? '000000' : base === 'back' ? 'zzzzzz' : base.replace(/\D/g,'').padStart(6,'0');
      const isSingle = base === 'cover' || base === 'back' || base.replace(/\D/g,'').length <= 2;
      return { sortKey, type: isSingle ? 'single' : 'spread', url: `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600` };
    }).sort((a,b) => a.sortKey.localeCompare(b.sortKey));
    cur = 0;
    preload(0); preload(1); preload(2);
    render();
  } catch(e) { showErr('불러오기 실패:\n' + e.message); }
}

function showErr(msg) {
  document.getElementById('album-screen').innerHTML = `<div class="err">${msg}</div>`;
}

function render() {
  const p = pages[cur];
  const book = document.getElementById('book');
  book.className = 'book ' + p.type;
  document.getElementById('counter').textContent = `${cur+1} / ${pages.length}`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === pages.length - 1;
  const cached = cache[p.url];
  if (cached) {
    showImg(book, cached.cloneNode(), p.type);
  } else {
    book.innerHTML = '<div class="loading-spinner"></div>';
    const img = new Image();
    img.onload = () => { cache[p.url] = img; showImg(book, img.cloneNode(), p.type); };
    img.onerror = () => { book.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px;">이미지 오류</div>'; };
    img.src = p.url;
  }
  preload(cur+1); preload(cur+2); preload(cur-1); preload(cur-2);
}

function showImg(book, img, type) {
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  book.innerHTML = '';
  book.appendChild(img);
  if (type === 'spread') {
    const spine = document.createElement('div'); spine.className = 'spine'; book.appendChild(spine);
  }
}

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= pages.length) return;
  const book = document.getElementById('book');
  book.classList.add('turning');
  setTimeout(() => { cur = next; render(); book.classList.remove('turning'); }, 200);
}

/* ── 더블탭 감지 공통 함수 ── */
function checkDoubleTap(x, y) {
  const now = Date.now();
  const dx = Math.abs(x - lastTapX);
  const dy = Math.abs(y - lastTapY);
  const isDouble = (now - lastTapTime < 300) && dx < 30 && dy < 30;
  lastTapTime = now;
  lastTapX = x; lastTapY = y;
  return isDouble;
}

/* ── 앨범 화면 터치 (스와이프 + 더블탭 확대) ── */
let swipeSX = 0, swipeSY = 0;

document.getElementById('album-screen').addEventListener('touchstart', e => {
  swipeSX = e.touches[0].clientX;
  swipeSY = e.touches[0].clientY;
}, {passive:true});

document.getElementById('album-screen').addEventListener('touchend', e => {
  const x = e.changedTouches[0].clientX;
  const y = e.changedTouches[0].clientY;
  const dx = x - swipeSX;
  const dy = y - swipeSY;

  if (checkDoubleTap(x, y) && isMobile) {
    openZoom(); return;
  }
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
}, {passive:true});

/* ── 확대 오버레이 ── */
let zX = 0, zY = 0, zDragSX = 0, zDragSY = 0;

function openZoom() {
  zoomed = true;
  const overlay = document.getElementById('zoom-overlay');
  const zImg = document.getElementById('zoom-img');
  zX = 0; zY = 0;
  zImg.src = pages[cur].url;
  // 화면 꽉 차게: 가로 100vw, 세로 100vh, object-fit contain으로 비율 유지
  zImg.style.width  = window.innerWidth + 'px';
  zImg.style.height = window.innerHeight + 'px';
  zImg.style.left   = '0px';
  zImg.style.top    = '0px';
  zImg.style.transform = 'translate(0px, 0px)';
  overlay.classList.add('active');
  // 더블탭 타이머 리셋 (openZoom 직후 바로 닫히지 않게)
  lastTapTime = 0;
}

function closeZoom() {
  zoomed = false;
  document.getElementById('zoom-overlay').classList.remove('active');
  lastTapTime = 0;
}

/* 오버레이 터치: 더블탭 닫기 + 드래그 이동 */
const zOverlay = document.getElementById('zoom-overlay');

zOverlay.addEventListener('touchstart', e => {
  zDragSX = e.touches[0].clientX - zX;
  zDragSY = e.touches[0].clientY - zY;
}, {passive:true});

zOverlay.addEventListener('touchmove', e => {
  e.preventDefault();
  zX = e.touches[0].clientX - zDragSX;
  zY = e.touches[0].clientY - zDragSY;
  document.getElementById('zoom-img').style.transform = `translate(${zX}px,${zY}px)`;
}, {passive:false});

zOverlay.addEventListener('touchend', e => {
  const x = e.changedTouches[0].clientX;
  const y = e.changedTouches[0].clientY;
  // 드래그 거의 없었으면 더블탭 체크
  const moved = Math.abs(x - (zDragSX + zX)) < 10 && Math.abs(y - (zDragSY + zY)) < 10;
  if (moved && checkDoubleTap(x, y)) closeZoom();
}, {passive:true});

/* ── 키보드 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && !zoomed) go(1);
  if (e.key === 'ArrowLeft'  && !zoomed) go(-1);
});

loadAlbum();
</script>
</body>
</html>
