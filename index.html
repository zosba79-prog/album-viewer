<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앨범 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#F5F0E8; --warm-brown:#5C4A32; --light-brown:#A08060; --gold:#C9A84C; --shadow:rgba(80,50,20,0.18); }
  html, body { height:100%; background:var(--cream); font-family:'Noto Sans KR',sans-serif; color:var(--warm-brown); overflow:hidden; }
  #lock-screen { position:fixed; inset:0; background:var(--cream); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; transition:opacity 0.6s ease,transform 0.6s ease; }
  #lock-screen.hidden { opacity:0; transform:scale(1.04); pointer-events:none; }
  .lock-deco { width:56px; height:56px; margin-bottom:1.8rem; opacity:0.3; }
  .lock-title { font-family:'Noto Serif KR',serif; font-size:clamp(20px,4vw,28px); font-weight:300; letter-spacing:0.08em; margin-bottom:0.4rem; text-align:center; }
  .lock-sub { font-size:13px; color:var(--light-brown); margin-bottom:2.2rem; letter-spacing:0.05em; text-align:center; }
  .pw-form { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; max-width:280px; }
  .pw-form input { width:100%; padding:11px 16px; border:1px solid #D4C4A8; border-radius:4px; background:#FDFAF5; font-family:'Noto Sans KR',sans-serif; font-size:16px; color:var(--warm-brown); text-align:center; letter-spacing:0.15em; outline:none; transition:border-color 0.2s; }
  .pw-form input:focus { border-color:var(--gold); }
  .pw-form button { width:100%; padding:11px; background:var(--warm-brown); color:#FAF7F2; border:none; border-radius:4px; font-family:'Noto Sans KR',sans-serif; font-size:14px; letter-spacing:0.12em; cursor:pointer; transition:background 0.2s; }
  .pw-form button:hover { background:#4A3828; }
  .pw-error { font-size:12px; color:#B05050; min-height:18px; }
  .lock-footer { position:fixed; bottom:2rem; font-size:11px; color:#C0B09A; letter-spacing:0.06em; }
  #album-screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.6s ease 0.3s; }
  #album-screen.visible { opacity:1; pointer-events:all; }
  .album-header { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:center; padding:1.2rem 1.5rem; }
  .album-name { font-family:'Noto Serif KR',serif; font-size:14px; font-weight:300; letter-spacing:0.14em; color:var(--light-brown); }
  .book-wrap { display:flex; flex-direction:column; align-items:center; gap:1.8rem; width:100%; padding:0 1rem; }
  .book { display:flex; align-items:stretch; border-radius:3px; overflow:hidden; box-shadow:-6px 6px 20px var(--shadow),6px 6px 20px var(--shadow),0 2px 6px rgba(0,0,0,0.12); max-width:min(88vw,760px); width:100%; aspect-ratio:2/1; transition:opacity 0.22s ease,transform 0.22s ease; }
  .book.turning { opacity:0; transform:scaleX(0.97); }
  .book-page { flex:1; background:#FAF7F2; position:relative; overflow:hidden; }
  .book-page img { width:100%; height:100%; object-fit:cover; display:block; }
  .book-page::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 60%); pointer-events:none; }
  .book-page.loading { display:flex; align-items:center; justify-content:center; }
  .book-page.loading::before { content:''; width:28px; height:28px; border:2px solid #D4C4A8; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .book-spine { width:5px; flex-shrink:0; background:linear-gradient(to right,#8A6A40 0%,#C9A070 30%,#B08050 50%,#8A6A40 100%); }
  .controls { display:flex; align-items:center; gap:1.5rem; }
  .ctrl-btn { width:44px; height:44px; border-radius:50%; border:1px solid #D4C4A8; background:rgba(255,255,255,0.7); color:var(--warm-brown); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s,border-color 0.15s,transform 0.1s; }
  .ctrl-btn:hover:not(:disabled) { background:rgba(255,255,255,0.95); border-color:var(--gold); }
  .ctrl-btn:active:not(:disabled) { transform:scale(0.95); }
  .ctrl-btn:disabled { opacity:0.25; cursor:default; }
  .page-counter { font-size:13px; color:var(--light-brown); letter-spacing:0.1em; min-width:70px; text-align:center; }
  .kb-hint { position:fixed; bottom:1.5rem; font-size:11px; color:#C0B09A; letter-spacing:0.06em; }
  @media(max-width:500px) { .book { aspect-ratio:3/2; } .book-spine { width:3px; } .ctrl-btn { width:38px; height:38px; font-size:17px; } }
</style>
</head>
<body>

<div id="lock-screen">
  <svg class="lock-deco" viewBox="0 0 64 64" fill="none">
    <rect x="12" y="28" width="40" height="28" rx="3" stroke="#5C4A32" stroke-width="2"/>
    <path d="M20 28V20C20 13.37 25.37 8 32 8C38.63 8 44 13.37 44 20V28" stroke="#5C4A32" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="42" r="4" fill="#5C4A32" opacity="0.5"/>
    <line x1="32" y1="46" x2="32" y2="51" stroke="#5C4A32" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </svg>
  <div class="lock-title" id="lock-title">소중한 앨범</div>
  <div class="lock-sub">비밀번호를 입력해 주세요</div>
  <div class="pw-form">
    <input type="password" id="pw-input" placeholder="••••••" autocomplete="off" />
    <button onclick="checkPassword()">열기</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
  <div class="lock-footer">개인 보호를 위해 비밀번호로 잠겨 있습니다</div>
</div>

<div id="album-screen">
  <div class="album-header"><div class="album-name" id="album-name"></div></div>
  <div class="book-wrap">
    <div class="book" id="book">
      <div class="book-page loading" id="page-left"></div>
      <div class="book-spine" id="spine"></div>
      <div class="book-page loading" id="page-right"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" onclick="go(-1)" disabled>&#8249;</button>
      <div class="page-counter" id="counter"></div>
      <button class="ctrl-btn" id="btn-next" onclick="go(1)">&#8250;</button>
    </div>
  </div>
  <div class="kb-hint">← → 키 또는 스와이프로 넘길 수 있어요</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const FOLDER = params.get('folder') || '';
const PW     = params.get('pw')     || '';
const TITLE  = params.get('title')  || '소중한 앨범';
const APIKEY = params.get('key')    || (window.GAPI_KEY || '');

document.getElementById('lock-title').textContent = TITLE;
document.getElementById('album-name').textContent = TITLE;
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPassword(); });

function checkPassword() {
  const val = document.getElementById('pw-input').value.trim();
  if (val === PW) {
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('album-screen').classList.add('visible');
    loadAlbum();
  } else {
    document.getElementById('pw-error').textContent = '비밀번호가 맞지 않습니다';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

let spreads = [], cur = 0;

async function loadAlbum() {
  if (!FOLDER || !APIKEY) return;
  try {
    const url = `https://www.googleapis.com/drive/v3/files?q=%27${FOLDER}%27+in+parents+and+mimeType+contains+%27image/%27&fields=files(id,name)&orderBy=name&pageSize=200&key=${APIKEY}`;
    const data = await fetch(url).then(r=>r.json());
    if (!data.files || !data.files.length) return;
    spreads = data.files
      .sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}))
      .map(f => ({
        type: f.name.replace(/\.[^.]+$/,'').length <= 2 ? 'single' : 'spread',
        url: `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`,
        label: f.name
      }));
    cur = 0; render();
  } catch(e) { console.error(e); }
}

function render() {
  const s = spreads[cur];
  const book=document.getElementById('book'), left=document.getElementById('page-left'), right=document.getElementById('page-right'), spine=document.getElementById('spine');
  document.getElementById('counter').textContent = `${cur+1} / ${spreads.length}`;
  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = cur===spreads.length-1;
  if (s.type==='single') {
    spine.style.display='none'; right.style.display='none';
    book.style.maxWidth='min(44vw,390px)'; book.style.aspectRatio='1/1';
    setImg(left, s.url);
  } else {
    spine.style.display='block'; right.style.display='block';
    book.style.maxWidth='min(88vw,760px)'; book.style.aspectRatio='2/1';
    setImg(left, s.url);
    right.className='book-page'; right.innerHTML='';
  }
}

function setImg(el, url) {
  el.className='book-page loading'; el.innerHTML='';
  const img=new Image();
  img.onload=()=>{ el.classList.remove('loading'); el.appendChild(img); };
  img.onerror=()=>{ el.classList.remove('loading'); el.textContent='이미지 오류'; };
  img.src=url; img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
}

function go(dir) {
  const next=cur+dir;
  if(next<0||next>=spreads.length) return;
  const book=document.getElementById('book');
  book.classList.add('turning');
  setTimeout(()=>{ cur=next; render(); book.classList.remove('turning'); },220);
}

document.addEventListener('keydown', e=>{
  if(!document.getElementById('album-screen').classList.contains('visible')) return;
  if(e.key==='ArrowRight') go(1); if(e.key==='ArrowLeft') go(-1);
});
let tx=0;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',e=>{
  if(!document.getElementById('album-screen').classList.contains('visible')) return;
  if(Math.abs(e.changedTouches[0].clientX-tx)>50) go(e.changedTouches[0].clientX-tx<0?1:-1);
},{passive:true});
</script>
</body>
</html>
